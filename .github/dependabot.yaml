version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
      time: "09:00"
      timezone: "Europe/Oslo"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - "25"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 20
    groups:
      react:
        patterns:
          - "react"
          - "@types/react"
          - "react-cookie"
          - "react-dom"
          - "@types/react-dom"
          - "react-router"
          - "@types/react-router"
      aksel:
        patterns:
          - "@navikt/aksel-icons"
          - "@navikt/ds-css"
          - "@navikt/ds-react"
      familie:
        patterns:
          - "@navikt/familie-form-elements"
          - "@navikt/familie-http"
          - "@navikt/familie-logging"
          - "@navikt/familie-skjema"
          - "@navikt/familie-typer"
      navikt:
        patterns:
          - "@navikt/fnrvalidator"
          - "@navikt/nav-dekoratoren-moduler"
          - "@navikt/oasis"
      sanity:
        patterns:
          - "@portabletext/react"
          - "@portabletext/toolkit"
          - "@portabletext/types"
          - "@sanity/client"
          - "ramda"
      observability:
        patterns:
          - "@grafana/faro-web-sdk"
          - "@sentry/react"
          - "@sentry/webpack-plugin"
      server:
        patterns:
          - "compression"
          - "cookie-parser"
          - "@types/cookie-parser"
          - "cors"
          - "@types/cors"
          - "express"
          - "@types/express"
          - "express-rate-limit"
          - "http-proxy-middleware"
          - "mustache-express"
          - "@types/mustache-express"
          - "xss"
      backend-utils:
        patterns:
          - "dotenv"
          - "unleash-client"
      frontend-utils:
        patterns:
          - "axios"
          - "date-fns"
          - "i18n-iso-countries"
          - "styled-components"
          - "@types/styled-components"
      common-utils:
        patterns:
          - "uuid"
      typescript-types:
        patterns:
          - "@types/eslint-plugin-jsx-a11y"
          - "@types/node"
          - "ts-essentials"
          - "ts-loader"
          - "ts-node"
          - "typescript"
      linting-formatting:
        patterns:
          - "@eslint/js"
          - "eslint"
          - "eslint-config-prettier"
          - "eslint-plugin-import"
          - "eslint-plugin-jsx-a11y"
          - "eslint-plugin-prettier"
          - "eslint-plugin-react-hooks"
          - "globals"
          - "prettier"
          - "typescript-eslint"
      testing:
        patterns:
          - "@testing-library/dom"
          - "@testing-library/jest-dom"
          - "@testing-library/react"
          - "@vitejs/plugin-react"
          - "cypress"
          - "jsdom"
          - "msw"
          - "vitest"
          - "vitest-mock-extended"
      webpack:
        patterns:
          - "@babel/core"
          - "@babel/plugin-syntax-import-assertions"
          - "@babel/preset-env"
          - "@babel/preset-react"
          - "@babel/preset-typescript"
          - "@pmmmwh/react-refresh-webpack-plugin"
          - "babel-loader"
          - "babel-plugin-styled-components"
          - "case-sensitive-paths-webpack-plugin"
          - "copy-webpack-plugin"
          - "css-loader"
          - "css-minimizer-webpack-plugin"
          - "html-webpack-plugin"
          - "mini-css-extract-plugin"
          - "react-dev-utils"
          - "react-refresh"
          - "style-loader"
          - "terser-webpack-plugin"
          - "webpack"
          - "webpack-bundle-analyzer"
          - "webpack-cli"
          - "webpack-dev-server"
          - "webpack-merge"
      dev-tools:
        patterns:
          - "@axe-core/react"
          - "concurrently"
          - "husky"
          - "lint-staged"
      patch-updates:
        update-types:
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 4
